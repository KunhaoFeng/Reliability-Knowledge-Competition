var STORAGE_KEY = 'reliability_quiz_wrongbook';
var PROGRESS_KEY = 'reliability_quiz_progress';

function loadWrongBook(){
  try{return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));}
  catch(e){return new Set();}
}
function saveWrongBook(wb){
  try{localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(wb)));}
  catch(e){}
}
function loadProgress(){
  try{return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');}
  catch(e){return {};}
}
function saveProgress(section, index){
  try{
    var p=loadProgress();
    p[String(section)]=index;
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
  }catch(e){}
}
function resetProgress(section){
  try{
    var p=loadProgress();
    delete p[String(section)];
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
  }catch(e){}
}

var state = {
  section: 1, mode: 'seq', questions: [], currentIndex: 0,
  answered: new Set(), correct: new Set(),
  wrongBook: loadWrongBook(), isErrorBookMode: false,
  multiSelected: [], autoNextTimer: null
};

function getSectionQuestions(section){
  section = parseInt(section);
  if(section === 0) return ALL_QUESTIONS.slice();
  return ALL_QUESTIONS.filter(function(q){return q.section === section;});
}

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

function typeLabel(t){
  var m={choice:'选择题',truefalse:'判断题',fillblank:'填空题',multiselect:'多选题'};
  return m[t]||t;
}

function esc(s){
  var d=document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function render(){
  clearAutoNext();
  var c=document.getElementById('appContainer');
  if(!c) return;
  if(state.isErrorBookMode){ renderErrorBook(c); return; }
  var qs=state.questions;
  if(!qs||qs.length===0){ c.innerHTML='<div class="empty-state"><div class="icon">📋</div><p>暂无题目</p></div>'; return; }
  
  var q=qs[state.currentIndex], idx=state.currentIndex, total=qs.length;
  var aCnt=state.answered.size, okCnt=state.correct.size;
  var pct=aCnt/total*100;
  state.multiSelected = [];
  // Display: use global question ID for position, global total
  var posLabel = q.id + '/' + ALL_QUESTIONS.length;
  
  var h='';
  h+='<div class="stats-bar">';
  h+='<div class="stat-item"><div class="stat-value">'+posLabel+'</div><div class="stat-label">当前进度</div></div>';
  h+='<div class="stat-item"><div class="stat-value correct">'+okCnt+'</div><div class="stat-label">正确</div></div>';
  h+='<div class="stat-item"><div class="stat-value wrong">'+(aCnt-okCnt)+'</div><div class="stat-label">错误</div></div>';
  h+='<div class="stat-item"><div class="stat-value">'+(total-aCnt)+'</div><div class="stat-label">剩余</div></div>';
  h+='</div>';
  // Jump bar - only show in sequential mode
  if(state.mode==='seq'){
    h+='<div class="jump-bar"><span>跳转到题目：</span><input type="number" id="jumpInput" min="1" placeholder="题号" onkeydown="if(event.keyCode===13)doJump()"><button onclick="doJump()">跳转</button><button onclick="resetProgress(state.section);state.currentIndex=0;state.answered=new Set();state.correct=new Set();render();window.scrollTo(0,0)" style="background:#e0e0e0;color:#333;margin-left:auto;">重置进度</button></div>';
  }
  h+='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
  
  h+='<div class="question-card">';
  h+='<div class="q-header">';
  h+='<span class="q-number">第 '+q.id+' 题</span>';
  var tCls = q.type==='multiselect' ? 'q-type multi' : 'q-type';
  h+='<span class="'+tCls+'">'+typeLabel(q.type)+'</span>';
  h+='</div>';
  h+='<div class="q-text">'+esc(q.question)+'</div>';
  
  var answered=state.answered.has(idx), correct=state.correct.has(idx);
  
  if(q.type==='multiselect') h+=rcMulti(q,idx,answered,correct);
  else if(q.type==='choice') h+=rcOpts(q,idx,answered,correct);
  else if(q.type==='truefalse') h+=rcTF(q,idx,answered,correct);
  else h+=rcFill(q,idx,answered,correct);
  
  if(answered){
    h+='<div class="result-box '+(correct?'correct':'wrong')+'">';
    h+=correct?'\u2705 回答正确！':'\u274C 回答错误！';
    if(!correct){
      h+='<div class="answer-text">正确答案：'+esc(q.answer)+'</div>';
    }
    if(q.explanation){
      h+='<div style="margin-top:8px;font-size:12px;opacity:.8;">\uD83D\uDCDD '+esc(q.explanation)+'</div>';
    }
    if(correct && qs.length>1){
      h+='<div class="auto-next-banner" id="autoNextBanner">1秒后自动跳转下一题...</div>';
    }
    h+='</div>';
  }
  h+='</div>';
  
  h+='<div class="nav-buttons">';
  h+='<button class="nav-btn secondary"'+(idx===0?' disabled':'')+' onclick="goPrev()">上一题</button>';
  if(!answered&&idx<total-1) h+='<button class="nav-btn secondary" onclick="skipQuestion()">跳过</button>';
  h+='<button class="nav-btn primary"'+(idx>=total-1&&answered?' disabled':'')+' onclick="goNext()">下一题</button>';
  h+='</div>';
  
  c.innerHTML=h;
  updateErrorBadge();
  
  // Save progress in sequential mode
  if(state.mode==='seq') saveProgress(state.section, state.currentIndex);
  
  // Auto-advance if correct
  if(answered && correct && state.currentIndex < qs.length - 1){
    state.autoNextTimer = setTimeout(function(){
      state.currentIndex++;
      render();
      window.scrollTo(0,0);
    }, 1000);
  }
}

function rcOpts(q,idx,ans,ok){
  var h='<div class="options">', labels=['A','B','C','D'];
  for(var i=0;i<q.options.length;i++){
    var cls='option';
    if(ans){cls+=' disabled';if(labels[i]===q.answer)cls+=' correct';}
    h+='<div class="'+cls+'" onclick="'+(!ans?'submitChoice('+idx+',\''+labels[i]+'\')':'')+'">';
    h+='<span class="option-label">'+labels[i]+'</span>';
    h+='<span>'+esc(q.options[i])+'</span>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function rcMulti(q,idx,ans,ok){
  var h='<div class="options">', labels=['A','B','C','D'];
  for(var i=0;i<q.options.length;i++){
    var cls='option multi-opt';
    if(ans){cls+=' disabled';}
    h+='<div class="'+cls+'" onclick="'+(!ans?'toggleMulti('+idx+',\''+labels[i]+'\')':'')+'" id="multiOpt_'+labels[i]+'">';
    h+='<span class="option-check" id="multiCheck_'+labels[i]+'">\u2713</span>';
    h+='<span>'+esc(q.options[i])+'</span>';
    h+='</div>';
  }
  h+='</div>';
  h+='<div class="ms-hint">\u2B50 点击选项选中多个，然后点击下方按钮提交答案</div>';
  h+='<div class="ms-submit"><button onclick="submitMulti('+idx+')" id="msSubmitBtn">\u63D0\u4EA4\u7B54\u6848</button></div>';
  return h;
}

function rcTF(q,idx,ans,ok){
  var h='<div class="tf-options">', opts=[{l:'\u2713 \u6B63\u786E',v:'\u221A',v2:'\u5BF9'},{l:'\u2717 \u9519\u8BEF',v:'\u00D7',v2:'\u9519'}];
  for(var i=0;i<opts.length;i++){
    var o=opts[i], cls='tf-btn';
    if(ans){cls+=' disabled';if(q.answer===o.v||q.answer===o.v2)cls+=' correct';}
    h+='<div class="'+cls+'" onclick="'+(!ans?'submitTF('+idx+',\''+o.v+'\',\''+o.v2+'\')':'')+'">'+o.l+'</div>';
  }
  h+='</div>';
  return h;
}

function rcFill(q,idx,ans,ok){
  var h='<div class="fill-input">';
  h+='<input type="text" id="fillAnswer" placeholder="\u8BF7\u8F93\u5165\u7B54\u6848..."'+(ans?' disabled':'')+' onkeydown="if(event.keyCode===13)submitFill('+idx+')">';
  h+='<button '+(ans?'disabled':'')+' onclick="submitFill('+idx+')">\u63D0\u4EA4</button>';
  h+='</div>';
  return h;
}

function clearAutoNext(){
  if(state.autoNextTimer){ clearTimeout(state.autoNextTimer); state.autoNextTimer=null; }
}

// Multi-select toggle
function toggleMulti(idx,label){
  var i=state.multiSelected.indexOf(label);
  if(i>=0) state.multiSelected.splice(i,1);
  else state.multiSelected.push(label);
  // Update UI
  var el=document.getElementById('multiOpt_'+label);
  var chk=document.getElementById('multiCheck_'+label);
  if(el)el.classList.toggle('multi-selected');
  if(chk)chk.textContent=state.multiSelected.length>0?'\u2713':'';
}

function submitMulti(idx){
  if(state.answered.has(idx))return;
  if(state.multiSelected.length===0)return;
  var q=state.questions[idx];
  var sel=state.multiSelected.slice().sort().join('');
  var ans=q.answer.split('').sort().join('');
  var ok=(sel===ans);
  state.answered.add(idx);
  if(ok){state.correct.add(idx);if(state.wrongBook.has(q.id)){state.wrongBook.delete(q.id);saveWrongBook(state.wrongBook);}}
  else{state.wrongBook.add(q.id);saveWrongBook(state.wrongBook);}
  // Disable all options
  var labels=['A','B','C','D'];
  for(var i=0;i<labels.length;i++){
    var el=document.getElementById('multiOpt_'+labels[i]);
    if(el){
      el.classList.add('disabled');
      if(sel.indexOf(labels[i])>=0) el.classList.add(ans.indexOf(labels[i])>=0?'correct':'wrong');
      if(ans.indexOf(labels[i])>=0) el.classList.add('correct');
    }
  }
  var btn=document.getElementById('msSubmitBtn'); if(btn)btn.disabled=true;
  render();
}

function submitChoice(idx,sel){
  if(state.answered.has(idx))return;
  clearAutoNext();
  var q=state.questions[idx];
  var ok=(sel===q.answer);
  state.answered.add(idx);
  if(ok){state.correct.add(idx);if(state.wrongBook.has(q.id)){state.wrongBook.delete(q.id);saveWrongBook(state.wrongBook);}}
  else{state.wrongBook.add(q.id);saveWrongBook(state.wrongBook);}
  render();
}

function submitTF(idx,val,v2){
  if(state.answered.has(idx))return;
  clearAutoNext();
  var q=state.questions[idx];
  var ok=(q.answer===val||q.answer===v2);
  state.answered.add(idx);
  if(ok){state.correct.add(idx);if(state.wrongBook.has(q.id)){state.wrongBook.delete(q.id);saveWrongBook(state.wrongBook);}}
  else{state.wrongBook.add(q.id);saveWrongBook(state.wrongBook);}
  render();
}

function submitFill(idx){
  if(state.answered.has(idx))return;
  var inp=document.getElementById('fillAnswer');
  if(!inp||!inp.value.trim())return;
  clearAutoNext();
  var q=state.questions[idx], ua=inp.value.trim(), ans=q.answer;
  var ok=(ua===ans||ans.indexOf(ua)>=0||ua.indexOf(ans)>=0);
  state.answered.add(idx);
  if(ok){state.correct.add(idx);if(state.wrongBook.has(q.id)){state.wrongBook.delete(q.id);saveWrongBook(state.wrongBook);}}
  else{state.wrongBook.add(q.id);saveWrongBook(state.wrongBook);}
  render();
}

function goPrev(){clearAutoNext();if(state.currentIndex>0){state.currentIndex--;render();}}
function goNext(){clearAutoNext();if(state.currentIndex<state.questions.length-1){state.currentIndex++;render();window.scrollTo(0,0);}}
function skipQuestion(){clearAutoNext();if(state.currentIndex<state.questions.length-1){state.currentIndex++;render();window.scrollTo(0,0);}}
function doJump(){
  var inp=document.getElementById('jumpInput');if(!inp||!inp.value)return;
  var qid=parseInt(inp.value);
  if(isNaN(qid))return;
  var idx=-1;
  for(var i=0;i<state.questions.length;i++){if(state.questions[i].id===qid){idx=i;break;}}
  if(idx>=0){clearAutoNext();state.currentIndex=idx;render();window.scrollTo(0,0);}
  else{alert('题目 ' + qid + ' 不在当前范围内');}
}

function renderErrorBook(c){
  var ids=Array.from(state.wrongBook), wq=[];
  for(var i=0;i<ALL_QUESTIONS.length;i++){if(ids.indexOf(ALL_QUESTIONS[i].id)>=0)wq.push(ALL_QUESTIONS[i]);}
  var h='';
  h+='<div class="stats-bar"><div class="stat-item"><div class="stat-value" style="color:#c62828;">'+wq.length+'</div><div class="stat-label">错题数量</div></div></div>';
  if(wq.length===0){
    h+='<div class="empty-state"><div class="icon">\uD83C\uDF89</div><p>太棒了！暂无错题</p></div>';
  }else{
    h+='<div class="mode-select">';
    h+='<button class="mode-btn primary-mode" onclick="startErrorPractice(\'seq\')">顺序复习错题</button>';
    h+='<button class="mode-btn" onclick="startErrorPractice(\'rand\')">随机复习错题</button>';
    h+='</div><div class="error-book-list" style="margin-top:16px;">';
    for(var i=0;i<wq.length;i++){
      var q=wq[i];
      h+='<div class="error-item" onclick="viewErrorQuestion('+q.id+')">';
      h+='<div class="q-info"><div class="q-id">'+typeLabel(q.type)+' \u00B7 第'+q.id+'题</div>';
      h+='<div class="q-preview">'+esc(q.question)+'</div>';
      h+='<div style="font-size:12px;color:#2e7d32;margin-top:2px;">答案：'+esc(q.answer)+'</div></div>';
      h+='<button class="remove-btn" onclick="event.stopPropagation();removeFromError('+q.id+')">&times;</button>';
      h+='</div>';
    }
    h+='</div>';
  }
  c.innerHTML=h;
}

function removeFromError(qid){state.wrongBook.delete(qid);saveWrongBook(state.wrongBook);render();}

function viewErrorQuestion(qid){
  state.isErrorBookMode=false;state.section=0;
  state.questions=getSectionQuestions(0);
  for(var i=0;i<state.questions.length;i++){if(state.questions[i].id===qid){state.currentIndex=i;break;}}
  document.querySelectorAll('.main-tab').forEach(function(t){t.classList.remove('active')});
  var at=document.querySelector('[data-section="0"]');if(at)at.classList.add('active');
  document.getElementById('subTabs').classList.remove('hidden');
  render();window.scrollTo(0,0);
}

function startErrorPractice(mode){
  var ids=Array.from(state.wrongBook), wq=[];
  for(var i=0;i<ALL_QUESTIONS.length;i++){if(ids.indexOf(ALL_QUESTIONS[i].id)>=0)wq.push(ALL_QUESTIONS[i]);}
  if(wq.length===0)return;
  state.isErrorBookMode=false;state.questions=mode==='rand'?shuffle(wq):wq;
  state.currentIndex=0;state.answered=new Set();state.correct=new Set();state.mode=mode;state.section=-1;
  document.querySelectorAll('.main-tab').forEach(function(t){t.classList.remove('active')});
  document.getElementById('errorTab').classList.add('active');
  document.getElementById('subTabs').classList.remove('hidden');
  render();window.scrollTo(0,0);
}

function switchSection(s){
  clearAutoNext();
  if(s==='err'){state.isErrorBookMode=true;state.section=-1;document.getElementById('subTabs').classList.add('hidden');}
  else{
    state.isErrorBookMode=false;state.section=parseInt(s);state.questions=getSectionQuestions(s);
    state.currentIndex=0;state.answered=new Set();state.correct=new Set();
    // Restore saved progress for sequential mode
    if(state.mode==='seq'){
      var p=loadProgress();
      var savedIdx=p[String(state.section)];
      if(typeof savedIdx==='number' && savedIdx>=0 && savedIdx<state.questions.length){
        state.currentIndex=savedIdx;
      }
    }
    document.getElementById('subTabs').classList.remove('hidden');
  }
  document.querySelectorAll('.main-tab').forEach(function(t){t.classList.remove('active')});
  var a=document.querySelector('[data-section="'+s+'"]');if(a)a.classList.add('active');
  render();window.scrollTo(0,0);
}

function switchMode(m){
  clearAutoNext();
  state.mode=m;state.currentIndex=0;state.answered=new Set();state.correct=new Set();
  if(m==='rand'){state.questions=shuffle(state.questions);}
  else{
    state.questions=getSectionQuestions(state.section);
    // Restore saved sequential progress
    var p=loadProgress();
    var savedIdx=p[String(state.section)];
    if(typeof savedIdx==='number' && savedIdx>=0 && savedIdx<state.questions.length) state.currentIndex=savedIdx;
  }
  document.querySelectorAll('.sub-tab').forEach(function(t){t.classList.toggle('active',t.dataset.mode===m)});
  render();window.scrollTo(0,0);
}

function updateErrorBadge(){
  var tab=document.getElementById('errorTab');if(!tab)return;
  var cnt=state.wrongBook.size;
  if(cnt>0){tab.setAttribute('data-badge',cnt);tab.classList.add('badge');}
  else{tab.removeAttribute('data-badge');tab.classList.remove('badge');}
}

document.addEventListener('keydown',function(e){
  // Don't handle shortcuts when typing in input
  var tag=(e.target.tagName||'').toLowerCase();
  if(tag==='input'||tag==='textarea'||e.target.isContentEditable) return;
  if(state.isErrorBookMode)return;
  var ans=state.answered.has(state.currentIndex), q=state.questions[state.currentIndex];
  if(!ans&&q&&q.type==='choice'){
    var km={'1':'A','2':'B','3':'C','4':'D','a':'A','b':'B','c':'C','d':'D'};
    if(km[e.key])submitChoice(state.currentIndex,km[e.key]);
  }
  if(e.key==='ArrowLeft')goPrev();
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();goNext();}
});

// Init
state.questions = getSectionQuestions(1);
var initP=loadProgress();
var saved1=initP['1'];
if(typeof saved1==='number' && saved1>=0 && saved1<state.questions.length) state.currentIndex=saved1;
render();
updateErrorBadge();
</script>
